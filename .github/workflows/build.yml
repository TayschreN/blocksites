name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Aceitar licenças Android SDK
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Instalar plataforma e build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1

      - name: Instalar Gradle 8.3
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /usr/local/
          echo "/usr/local/gradle-8.3/bin" >> $GITHUB_PATH

      - name: Compilar APK
        working-directory: BloqueadorSites
        run: gradle assembleDebug --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BloqueadorSites-debug
          path: BloqueadorSites/app/build/outputs/apk/debug/app-debug.apk
